# ══════════════════════════════════════════════════════════
#  FARMACY — Nginx Frontend Config (producción)
#  SPA + SSG pre-renderizado + proxy API al backend
#
#  Instalación: copiar a /etc/nginx/conf.d/default.conf
# ══════════════════════════════════════════════════════════

server {
    listen       80;
    server_name  _;
    root         /usr/share/nginx/html;
    index        index.html;

    # ── Gzip dinámico ────────────────────────────────────
    gzip on;
    gzip_types text/plain text/css application/json application/javascript text/xml text/html image/svg+xml;
    gzip_min_length 256;
    gzip_vary on;
    gzip_proxied any;
    gzip_comp_level 6;

    # ── Seguridad headers ────────────────────────────────
    add_header X-Content-Type-Options "nosniff" always;
    add_header X-Frame-Options "DENY" always;
    add_header X-XSS-Protection "1; mode=block" always;
    add_header Referrer-Policy "strict-origin-when-cross-origin" always;
    add_header Permissions-Policy "camera=(), microphone=(), geolocation=()" always;

    # ── SPA + SSG ────────────────────────────────────────
    # Intenta: archivo .html pre-renderizado → directorio → SPA fallback
    location / {
        try_files $uri.html $uri $uri/ /index.html;
        add_header Cache-Control "no-cache, no-store, must-revalidate";
    }

    # ── Assets compilados con hashes (cache largo) ───────
    location /assets/ {
        expires 1y;
        add_header Cache-Control "public, immutable";
    }

    # ── Archivos pre-renderizados estáticos (cache moderado) ─
    location ~* \.html$ {
        expires 1h;
        add_header Cache-Control "public, must-revalidate";
    }

    # ── Archivos públicos estáticos (favicon, manifest, etc.) ─
    location ~* \.(ico|svg|xml|json|webmanifest)$ {
        expires 7d;
        add_header Cache-Control "public, must-revalidate";
    }

    # ── Proxy inverso al backend ─────────────────────────
    location /api/ {
        proxy_pass http://backend:3000;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;

        # Timeouts
        proxy_connect_timeout 60s;
        proxy_send_timeout    60s;
        proxy_read_timeout    60s;
    }

    # ── WebSocket proxy para POS en vivo ─────────────────
    location /ws {
        proxy_pass http://backend:3000;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;

        # Timeouts largos para WebSocket
        proxy_connect_timeout 60s;
        proxy_read_timeout    86400s;  # 24h — conexión persistente
        proxy_send_timeout    60s;
    }

    # ── Health check interno ─────────────────────────────
    location /health {
        access_log off;
        return 200 "healthy\n";
    }

    # ── Denegar acceso a archivos sensibles ──────────────
    location ~ /\. {
        deny all;
        access_log off;
        log_not_found off;
    }

    location ~ /(\.env|\.git|composer\.json|package\.json|tsconfig\.) {
        deny all;
        access_log off;
        log_not_found off;
    }
}
