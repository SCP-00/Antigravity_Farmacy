<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Sin conexión — Farmacy</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      font-family: system-ui, -apple-system, 'Segoe UI', Roboto, sans-serif;
      background: #F5F8F6;
      color: #1A2B23;
      min-height: 100dvh;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 24px;
    }
    .card {
      background: #fff;
      border-radius: 24px;
      padding: 48px 32px;
      max-width: 400px;
      width: 100%;
      text-align: center;
      box-shadow: 0 4px 24px rgba(15, 110, 86, 0.08);
      border: 1px solid #D8EBE4;
    }
    .icon {
      width: 80px;
      height: 80px;
      background: #E8F5F0;
      border-radius: 50%;
      display: flex;
      align-items: center;
      justify-content: center;
      margin: 0 auto 24px;
    }
    .icon svg { width: 40px; height: 40px; fill: none; stroke: #0F6E56; stroke-width: 2; stroke-linecap: round; stroke-linejoin: round; }
    h1 { font-size: 20px; font-weight: 700; margin-bottom: 8px; color: #0A5A45; }
    p { font-size: 15px; line-height: 1.6; color: #5B7A6E; margin-bottom: 24px; }
    .btn {
      display: inline-flex; align-items: center; gap: 8px;
      padding: 12px 28px; border-radius: 12px; font-size: 15px; font-weight: 600;
      background: #0F6E56; color: #fff; border: none; cursor: pointer;
      transition: background 0.2s, transform 0.15s;
    }
    .btn:hover { background: #0A5A45; }
    .btn:active { transform: scale(0.97); }
    .btn svg { width: 18px; height: 18px; fill: none; stroke: currentColor; stroke-width: 2.5; stroke-linecap: round; stroke-linejoin: round; }
    .footer { margin-top: 24px; font-size: 12px; color: #9AB5A8; }
  </style>
</head>
<body>
  <div class="card" role="alert">
    <div class="icon" aria-hidden="true">
      <svg viewBox="0 0 24 24">
        <path d="M22 12h-4l-3 9L9 3l-3 9H2"/>
      </svg>
    </div>
    <h1>Sin conexión</h1>
    <p>Parece que no tienes internet en este momento. Revisa tu conexión e intenta de nuevo.</p>
    <button class="btn" onclick="window.location.reload()">
      <svg viewBox="0 0 24 24">
        <polyline points="23 4 23 10 17 10"/>
        <path d="M20.49 15a9 9 0 1 1-2.12-9.36L23 10"/>
      </svg>
      Reintentar
    </button>
    <div class="footer">Farmacy — Tu farmacia digital</div>
  </div>
</body>
</html>
