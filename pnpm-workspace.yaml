packages:
  - 'backend'
  - 'frontend'

overrides:
  esbuild: '>=0.24.3'
  uuid: '>=11.1.1'

onlyBuiltDependencies:
  - '@prisma/client'
  - '@prisma/engines'
  - esbuild
  - prisma

allowBuilds:
  '@prisma/client': true
  '@prisma/engines': true
  '@scarf/scarf': false
  esbuild: true
  msgpackr-extract: true
  prisma: true
