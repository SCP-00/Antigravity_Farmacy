# ══════════════════════════════════════════════════════════
#  FARMACY — Secret Scanning (Gitleaks)
#
#  Escanea secrets en cada PR y push a main.
#  Usa la configuración personalizada en backend/.gitleaks.toml.
# ══════════════════════════════════════════════════════════

name: Secret Scanning

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  gitleaks:
    name: Gitleaks scan
    runs-on: ubuntu-latest
    timeout-minutes: 5

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Run Gitleaks
        uses: gitleaks/gitleaks-action@v2
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          GITLEAKS_CONFIG: backend/.gitleaks.toml
          GITLEAKS_NOTIFY_USER: false

      - name: Check Gitleaks exit code
        if: failure()
        run: |
          echo "❌ Secret scanning detectó posibles credenciales en el código."
          echo "   Revisa los resultados en la pestaña Security del repositorio."
          echo "   Si es un falso positivo, agrega la ruta a backend/.gitleaks.toml [allowlist]."
          exit 1
